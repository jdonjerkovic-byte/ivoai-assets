<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Icon mark (condensed, left side) -->
  <circle cx="48" cy="10" r="7.5" fill="#0066FF"/>
  <line x1="48" y1="17.5" x2="48" y2="98" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Upper diagonals -->
  <line x1="48" y1="32" x2="28" y2="16" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="68" y2="16" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="28" cy="16" r="3.5" fill="#0066FF"/>
  <circle cx="68" cy="16" r="3.5" fill="#0066FF"/>
  <!-- Middle horizontals -->
  <line x1="48" y1="56" x2="22" y2="56" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="48" y1="56" x2="74" y2="56" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="22" cy="56" r="3.5" fill="#0066FF"/>
  <circle cx="74" cy="56" r="3.5" fill="#0066FF"/>
  <!-- Lower diagonals -->
  <line x1="48" y1="76" x2="28" y2="94" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="48" y1="76" x2="68" y2="94" stroke="#0066FF" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="28" cy="94" r="3.5" fill="#0066FF"/>
  <circle cx="68" cy="94" r="3.5" fill="#0066FF"/>

  <!-- IVOAI wordmark -->
  <text x="100" y="80"
        font-family="'Montserrat','Arial Black','Helvetica Neue',sans-serif"
        font-weight="800"
        font-size="70"
        fill="#0066FF"
        letter-spacing="2">IVOAI</text>

  <!-- Underline extending right -->
  <line x1="100" y1="90" x2="470" y2="90" stroke="#0066FF" stroke-width="2"/>

  <!-- Tagline -->
  <text x="100" y="110"
        font-family="'Montserrat','Arial','Helvetica Neue',sans-serif"
        font-weight="300"
        font-size="13"
        fill="#0066FF"
        letter-spacing="4">IT WITHOUT THE JARGON</text>
</svg>
